<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>Ładowanie...</title>
    <style>
        /* --- STYLIZACJA WYGLĄDU (CSS) --- */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        
        #bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-size: cover; background-position: center; 
            z-index: 1; transition: background-image 2.5s ease-in-out; 
            animation: kenburns 60s linear infinite; 
        }

        @keyframes kenburns { 0% { transform: scale(1.0); } 100% { transform: scale(1.15); } }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 2; }
        
        .main-layout { position: relative; z-index: 3; display: flex; align-items: center; justify-content: space-around; height: 100vh; padding: 0 50px; }
        
        .side-panel { 
            background: rgba(0, 0, 0, 0.85); padding: 30px; border-radius: 20px; 
            border: 1px solid rgba(0, 170, 255, 0.2); width: 320px; min-height: 250px; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
        }

        /* --- STYL LISTY TRYBÓW --- */
        .gamemodes-container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Dwa rzędy/kolumny */
            gap: 15px;
            width: 100%;
            margin-top: 15px;
        }
        .gamemode-item {
            background: rgba(0, 170, 255, 0.1);
            border: 1px solid rgba(0, 170, 255, 0.3);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.85rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .center-panel { text-align: center; width: 400px; }
        .loader-bar { background: #1a1a1a; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 20px; }
        .loader-fill { background: linear-gradient(90deg, #00aaff, #00ffcc); height: 100%; width: 0%; transition: width 0.4s; }
    </style>
</head>
<body>

    <div id="bg"></div>
    <div class="overlay"></div>

    <div class="main-layout">
        
        <!-- ========================================== -->
        <!-- LEWA STRONA: LISTA TRYBÓW (2 KOLUMNY) -->
        <!-- ========================================== -->
        <div class="side-panel">
            <div style="color:#00ffcc; text-transform:uppercase; border-bottom:1px solid #333; width:100%; text-align:center; padding-bottom:8px; margin-bottom:15px;">
                Dostępne Tryby
            </div>
            
            <div class="gamemodes-container">
                <!-- Tutaj wpisz swoje tryby -->
                <div class="gamemode-item">Slashers</div>
                <div class="gamemode-item">Stop it, Slender!</div>
                <div class="gamemode-item">Prop Hunt</div>
                <div class="gamemode-item">Murder</div>
                <div class="gamemode-item">TTT</div>
                <div class="gamemode-item">Zombie</div>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- ŚRODEK: LOGO I STATUS ŁADOWANIA -->
        <!-- ========================================== -->
        <div class="center-panel">
            <img src="cdnlogos.png" style="width:280px; margin-bottom:15px; filter: drop-shadow(0 0 20px rgba(0,170,255,0.8));" onerror="this.style.display='none'">
            <h1 id="servername" style="color:#00aaff; text-transform:uppercase; font-size:24px;">ŁĄCZENIE...</h1>
            
            <div style="color:#aaa; font-size:13px; margin: 5px 0;">TRYB: <span id="gamemode" style="color:white;">Wczytywanie...</span></div>
            <div style="color:#aaa; font-size:13px; margin: 5px 0;">MAPA: <span id="mapname" style="color:white;">Wczytywanie...</span></div>
            
            <div class="loader-bar">
                <div id="fill" class="loader-fill"></div>
            </div>
            <div id="status" style="font-size:10px; color:#444; margin-top:10px; font-weight:bold; text-transform: uppercase;">Inicjalizacja...</div>
        </div>

        <!-- ========================================== -->
        <!-- PRAWA STRONA: REGULAMIN -->
        <!-- ========================================== -->
        <div class="side-panel">
            <div style="color:#00ffcc; text-transform:uppercase; border-bottom:1px solid #333; width:100%; text-align:center; padding-bottom:8px; margin-bottom:15px;">
                Regulamin
            </div>
            
            <div style="color:#ddd; font-size:0.85rem; line-height:1.8; width: 100%;">
                ➜ Zakaz używania cheatów.<br>
                ➜ Mikrofon od 16 lat (lub mutacja).<br>
                ➜ Szanuj innych graczy i administrację.<br>
                ➜ Zakaz RDM / VDM.<br>
                ➜ Baw się dobrze!
            </div>
        </div>

    </div>

    <audio id="loading-music" loop><source src="cdnloading.ogg" type="audio/ogg"></audio>

    <script>
        const images = ["cdn_1.jpg", "cdn_2.jpg", "cdn_3.jpg", "cdn_4.jpg", "cdn_5.jpg", "cdn_6.jpg", "cdn_7.jpg", "cdn_8.jpg", "cdn_9.jpg", "cdn_10.jpg", "cdn_11.jpg", "cdn_12.jpg", "cdn_13.jpg"];
        let currentIndex = 0;
        function changeImage() {
            const img = new Image();
            img.src = images[currentIndex];
            img.onload = () => { 
                document.getElementById('bg').style.backgroundImage = "url('" + images[currentIndex] + "')"; 
                currentIndex = (currentIndex + 1) % images.length; 
            };
        }
        setInterval(changeImage, 8000); 
        changeImage();

        function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode) {
            document.getElementById("servername").innerText = servername;
            document.getElementById("mapname").innerText = mapname;
            document.getElementById("gamemode").innerText = gamemode;
            const music = document.getElementById("loading-music");
            music.volume = 0.2; music.play().catch(() => {});
        }

        function SetFilesNeeded(n) { totalFiles = n > 0 ? n : 100; }
        function SetFilesRemaining(r) { document.getElementById("fill").style.width = Math.min(100, ((totalFiles - r) / totalFiles) * 100) + "%"; }
        function SetStatusChanged(s) { document.getElementById("status").innerText = s; }
        var totalFiles = 100;
    </script>
</body>
</html>
